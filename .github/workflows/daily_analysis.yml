name: 连板打板每日分析

on:
  schedule:
    - cron: '30 7 * * 1-5'
  workflow_dispatch:

concurrency:
  group: lianban-analysis
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 随机延迟
        run: sleep $((RANDOM % 30))

      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r .github/scripts/requirements.txt

      - name: 创建目录
        run: mkdir -p data reports

      - name: 采集连板数据
        run: python .github/scripts/collect_lianban_data.py

      - name: AI 分析生成报告
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
        run: python .github/scripts/lianban_ai_analyze.py

      - name: 推送报告到飞书
        if: always()
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: python .github/scripts/send_feishu.py

      - name: 上传报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lianban-report-${{ github.run_number }}
          path: |
            reports/
            data/
          retention-days: 30
